--- #################### MQ 消息队列相关配置 ####################

--- #################### 定时任务相关配置 ####################

xxl:
  job:
    executor:
      appname: ${spring.application.name} # 执行器 AppName
      logpath: ${user.home}/logs/xxl-job/${spring.application.name} # 执行器运行日志文件存储磁盘路径
    accessToken: default_token # 执行器通讯TOKEN

--- #################### AI 相关配置 ####################

spring:
  ai:
    vectorstore: # 向量存储
      redis:
        initialize-schema: true
        index-name: knowledge_index # Redis 中向量索引的名称：用于存储和检索向量数据的索引标识符，所有相关的向量搜索操作都会基于这个索引进行
        prefix: "knowledge_segment:" # Redis 中存储向量数据的键名前缀：这个前缀会添加到每个存储在 Redis 中的向量数据键名前，每个 document 都是一个 hash 结构
      qdrant:
        initialize-schema: true
        collection-name: knowledge_segment # Qdrant 中向量集合的名称：用于存储向量数据的集合标识符，所有相关的向量操作都会在这个集合中进行
        host: 127.0.0.1
        port: 6334
      milvus:
        initialize-schema: true
        database-name: default # Milvus 中数据库的名称
        collection-name: knowledge_segment # Milvus 中集合的名称：用于存储向量数据的集合标识符，所有相关的向量操作都会在这个集合中进行
        client:
          host: 127.0.0.1
          port: 19530
    qianfan: # 文心一言
      api-key: ${QIANFAN_API_KEY:}
      secret-key: ${QIANFAN_SECRET_KEY:}
    zhipuai: # 智谱 AI
      api-key: ${ZHIPUAI_API_KEY:}
    openai: # OpenAI 官方
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:}
    azure: # OpenAI 微软
      openai:
        endpoint: ${AZURE_OPENAI_ENDPOINT:}
    anthropic: # Anthropic Claude
      api-key: ${ANTHROPIC_API_KEY:}
    ollama:
      base-url: http://127.0.0.1:11434
      chat:
        model: llama3
    stabilityai:
      api-key: ${STABILITYAI_API_KEY:}
    dashscope: # 通义千问
      api-key: ${DASHSCOPE_API_KEY:}
    minimax: # Minimax：https://www.minimaxi.com/
      api-key: ${MINIMAX_API_KEY:}
    moonshot: # 月之暗面（KIMI）
      api-key: ${MOONSHOT_API_KEY:}
    deepseek: # DeepSeek
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: deepseek-v4-pro
    model:
      rerank: false # 是否开启“通义千问”的 Rerank 模型，填写 dashscope 开启
    mcp:
      server:
        enabled: false
        name: yudao-mcp-server
        version: 1.0.0
        instructions: 一个 MCP 示例服务
        sse-endpoint: /sse
      client:
        enabled: false
        name: mcp
        sse:
          connections:
            filesystem:
              url: http://127.0.0.1:8089
              sse-endpoint: /sse
        annotation-scanner:
          enabled: false # TODO: 有 bug https://github.com/spring-projects/spring-ai/issues/4917 需要官方修复

yudao:
  ai:
    gemini: # 谷歌 Gemini
      enable: false
      api-key: ${GEMINI_API_KEY:}
      model: gemini-2.5-flash
    doubao: # 字节豆包
      enable: false
      api-key: ${DOUBAO_API_KEY:}
      model: doubao-1-5-lite-32k-250115
    hunyuan: # 腾讯混元
      enable: false
      api-key: ${HUNYUAN_API_KEY:}
      model: hunyuan-turbo
    siliconflow: # 硅基流动
      enable: false
      api-key: ${SILICONFLOW_API_KEY:}
      model: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
    xinghuo: # 讯飞星火
      enable: false
      appKey: ${XINGHUO_APP_KEY:}
      secretKey: ${XINGHUO_SECRET_KEY:}
      model: x1
    baichuan: # 百川智能
      enable: false
      api-key: ${BAICHUAN_API_KEY:}
      model: Baichuan4-Turbo
    midjourney:
      enable: false
      #    base-url: ${MIDJOURNEY_BASE_URL:}
      base-url: ${MIDJOURNEY_BASE_URL:}
      api-key: ${MIDJOURNEY_API_KEY:}
      notify-url: ${MIDJOURNEY_NOTIFY_URL:}
    suno:
      enable: false
      #    base-url: https://suno-55ishh05u-status2xxs-projects.vercel.app
      base-url: http://127.0.0.1:3001
    web-search:
      enable: false
      api-key: ${WEB_SEARCH_API_KEY:}

--- #################### AI 安全与配置 ####################

yudao:
  ai:
    security:
      rate-limit-enabled: true
      sensitive-word-enabled: true
      content-review-enabled: false
      quota-enabled: true
      max-calls-per-minute: 20
      max-calls-per-hour: 200
    statistics:
      record-enabled: true
      retention-days: 90
    chat:
      auto-generate-title: true
      max-conversations-per-user: 100
      default-max-contexts: 10
      default-temperature: 0.8

--- #################### AI 社交与学习配置 ####################

yudao:
  ai:
    social:
      check-in:
        base-points: 10         # 基础签到积分
        streak-bonus-7: 5        # 连续7天额外积分
        streak-bonus-30: 10      # 连续30天额外积分
        streak-bonus-100: 20     # 连续100天额外积分
      leaderboard:
        redis-enabled: true      # 是否启用 Redis 排行榜
        top-n: 20                # 排行榜默认返回数量
      activity:
        retention-days: 90       # 动态保留天数

--- #################### 芋道相关配置 ####################

yudao:
  info:
    version: 1.0.0
    base-package: cn.iocoder.yudao.module.ai
  web:
    admin-ui:
      url: ${ADMIN_UI_URL:http://localhost:48080}
  xss:
    enable: false
    exclude-urls: # 如下 url，仅仅是为了演示，去掉配置也没关系
      - ${management.endpoints.web.base-path}/** # 不处理 Actuator 的请求
  swagger:
    title: 管理后台
    description: 提供管理员管理的所有功能
    version: ${yudao.info.version}
  tenant: # 多租户相关配置项
    enable: true

debug: false

# ========== AI 调用超时与容错配置 ==========
spring:
  ai:
    retry:
      max-attempts: 2       # AI 调用失败重试 1 次
      backoff:
        initial-interval: 2000ms  # 重试间隔 2 秒
    openai:
      connect-timeout: 10s  # 连接超时
      read-timeout: 60s     # 读取超时（AI 生成可能需要较长时间）
    ollama:
      chat:
        timeout: 120s       # Ollama 本地模型超时更长

# 科大讯飞 Spark AI Configuration (使用 OpenAI 兼容接口)
# 接口文档: https://www.xfyun.cn/doc/spark/Web.html#_2-openai-兼容接口
iflytek:
  # 请填入科大讯飞的 APIPassword (注意不是 APIKey/APISecret)
  apiKey: ${IFLYTEK_API_KEY:}
  # OpenAI 兼容接口地址 (请勿随意修改)
  apiUrl: https://spark-api-open.xf-yun.com/v2/chat/completions
  # 模型参数，常见值: general (Lite/V1.5/V2/V3), generalv3 (Pro), generalv3.5 (Max), 4.0Ultra (Ultra)
  # 如果 general 报错，请尝试 generalv3 或 generalv3.5
  model: spark-x