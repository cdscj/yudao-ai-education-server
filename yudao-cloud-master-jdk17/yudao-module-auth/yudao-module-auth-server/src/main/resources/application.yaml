spring:
  application:
    name: auth-server

  profiles:
    active: local

  main:
    allow-circular-references: true # ??????????????????????????
    allow-bean-definition-overriding: true # ?? Bean ?????? Feign ???????????

  config:
    import:
      - optional:classpath:application-${spring.profiles.active}.yaml # ????????
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml # ???Nacos????

  # Servlet ??
  servlet:
    # ?????????
    multipart:
      max-file-size: 16MB # ??????
      max-request-size: 32MB # ??????????

  # Jackson ???
  jackson:
    serialization:
      write-dates-as-timestamps: true # ?? LocalDateTime ?????????
      write-date-timestamps-as-nanoseconds: false # ????? nanoseconds ??????? 1611460870.401????? 1611460870401
      write-durations-as-timestamps: true # ?? Duration ?????????
      fail-on-empty-beans: false # ????????? Bean

  # Cache ???
  cache:
    type: REDIS
    redis:
      time-to-live: 1h # ??????? 1 ??

server:
  port: 48087

logging:
  file:
    name: ${user.home}/logs/${spring.application.name}.log # ?????????

--- #################### ?????? ####################

springdoc:
  api-docs:
    enabled: true # 1. ???? Swagger ???????
    path: /v3/api-docs
  swagger-ui:
    enabled: true # 2.1 ???? Swagger ????? UI ??
    path: /swagger-ui
  default-flat-param-object: true # ?? https://doc.xiaominfo.com/docs/faq/v4/knife4j-parameterobject-flat-param ??

knife4j:
  enable: true
  setting:
    language: zh_cn

# MyBatis Plus ????
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # ????? true ????????????
  global-config:
    db-config:
      id-type: NONE # ????????? IdTypeEnvironmentPostProcessor + ???????????? AUTO?INPUT ???
      #      id-type: AUTO # ?? ID??? MySQL ?????????
      #      id-type: INPUT # ???? ID??? Oracle?PostgreSQL?Kingbase?DB2?H2 ???
      #      id-type: ASSIGN_ID # ?? ID?????????????Oracle?PostgreSQL?Kingbase?DB2?H2 ?????????????? @KeySequence ??
      logic-delete-value: 1 # ??????(??? 1)
      logic-not-delete-value: 0 # ??????(??? 0)
    banner: false # ?????? Banner ??
  type-aliases-package: ${yudao.info.base-package}.dal.dataobject
  encryptor:
    password: your-aes-encrypt-key # ?????????? https://www.imaegoo.com/2020/aes-key-generator/ ????

mybatis-plus-join:
  banner: false # ?????? Banner ??

# Spring Data Redis ??
