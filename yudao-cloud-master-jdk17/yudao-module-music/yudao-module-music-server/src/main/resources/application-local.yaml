--- #################### 接口文档配置 (Swagger/Knife4j) ####################
springdoc:
  default-flat-param-object: true # 解决 GET 请求对象参数扁平化问题
knife4j:
  enable: true
  setting:
    language: zh_cn

--- #################### 数据库 + MyBatis Plus ####################
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: NONE # 智能模式，适配 MySQL 自增
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  type-aliases-package: ${yudao.info.base-package}.dal.dataobject
  encryptor:
    password: your-aes-encrypt-key # 可保持默认，或去 https://www.imaegoo.com/2020/aes-key-generator/ 生成

spring:
  autoconfigure:
    exclude:
      - com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure
  datasource:
    druid:
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 100
    dynamic:
      druid:
        initial-size: 1
        min-idle: 1
        max-active: 20
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 600000
        validation-query: SELECT 1 FROM DUAL
        test-while-idle: true
      primary: master
      datasource:
        master:
          # 【关键】修改数据库名为 yudao-music (记得先去 MySQL 创建这个库)
          url: jdbc:mysql://127.0.0.1:3306/yudao-music?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: root
          password: '${DB_PASSWORD:root}' # 改成你的 MySQL 密码

  # Redis 配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 1
      username: default
      password: ${DB_PASSWORD:root}
  redis:
    repositories:
      enabled: false


--- #################### 注册中心 + 配置中心 (Nacos) ####################
spring:
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848 # 改成你的 Nacos 地址
      username: nacos
      password: 
      discovery:
        namespace: dev # 保持和 system 一样的 namespace 或新建
        group: DEFAULT_GROUP
      config:
        namespace: dev
        group: DEFAULT_GROUP

--- #################### 芋道框架基础配置 ####################
yudao:
  info:
    version: 1.0.0
    base-package: cn.iocoder.yudao.module.music # 【关键】修改为 music 模块的包路径
  web:
    admin-ui:
      url: http://dashboard.yudao.iocoder.cn
  swagger:
    title: 管理后台 - Music 模块
    description: 提供音乐、歌单等管理功能
    version: ${yudao.info.version}
  tenant:
    enable: false # 【重要】如果不需要租户功能，这里设为 false
  captcha:
    enable: false # 本地开发建议关闭验证码
  access-log:
    enable: true

--- #################### 定时任务 (XXL-Job) ####################
xxl:
  job:
    enabled: false # 本地如果没部署 XXL-Job，先设为 false
    admin:
      addresses: http://127.0.0.1:9090/xxl-job-admin
    executor:
      appname: ${spring.application.name}
      logpath: ${user.home}/logs/xxl-job/${spring.application.name}

--- #################### 监控相关 ####################
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: '*'

# 日志级别
logging:
  level:
    cn.iocoder.yudao.module.music.dal.mysql: debug # 【关键】修改为 music 模块的 mapper 包路径，方便看 SQL
dubbo:
  # 应用配置
  application:
    id: ${spring.application.name}
    name: ${spring.application.name}
    # 序列化方式（高性能）
    serialize: kryo
  # 协议配置
  protocol:
    name: dubbo
    # 随机端口
    port: -1
  # 注册中心（复用 Nacos）
  registry:
    address: spring-cloud://127.0.0.1:8848
  # 消费端配置
  consumer:
    # 启动时不检查服务是否存在（开发友好）
    check: false
    timeout: 10000
  # 扫描 Dubbo 接口
  scan:
    base-packages: cn.iocoder.yudao.module.music